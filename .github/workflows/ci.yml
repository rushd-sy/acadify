name: CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acadify_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/acadify_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter service exec prisma generate

      - name: Run Prisma Migrations
        run: pnpm --filter service exec prisma migrate deploy

      - name: Check formatting
        run: pnpm prettier --check .

      - name: Build DTOs
        run: pnpm --filter dtos build

      - name: Lint service
        run: pnpm --filter service lint

      - name: Lint dashboard
        run: pnpm --filter dashboard lint

      - name: Run service tests
        run: pnpm --filter service test

      - name: Build service
        run: pnpm --filter service build

      - name: Build dashboard
        run: pnpm --filter dashboard build
